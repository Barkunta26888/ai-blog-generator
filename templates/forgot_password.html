<!DOCTYPE html>
<html>

<head>
    <title>Forgot Password</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            width: 400px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 8px;
            border: 1px solid gray;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border: none;
            background: blue;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        #msg {
            margin-top: 15px;
            color: green;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>Forgot Password</h2>
        <p>Enter your email to get reset link</p>

        <input type="email" id="email" placeholder="Enter your email">

        <button onclick="sendResetLink()">Send Reset Link</button>

        <p id="msg"></p>
    </div>

    <script>
        function sendResetLink() {

            let email = document.getElementById("email").value;
            let msg = document.getElementById("msg");

            msg.innerText = "Sending...";

            fetch("http://127.0.0.1:5000/forgot-password", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ email: email })
            })
                .then(res => res.json())
                .then(data => {
                    msg.innerText = data.message;
                })
                .catch(error => {
                    msg.innerText = "Error: Backend not responding!";
                    console.log("Fetch Error:", error);
                });
        }
    </script>


</body>

</html>
